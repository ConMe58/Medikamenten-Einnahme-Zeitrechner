<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medikamenten-Scheduler</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <main>
    <h1>Medikamenten-Scheduler</h1>
    <p class="warning">Rechenhilfe. Keine medizinische Empfehlung. Regeln nicht erraten.</p>

    <section>
      <h2>Einnahme dokumentieren</h2>
      <div class="controls">
        <select id="medSelect"></select>
        <input id="timeInput" type="time" />
        <button id="addBtn">Einnahme speichern</button>
        <button id="clearBtn" class="secondary">Tag löschen</button>
      </div>
    </section>

    <section>
      <h2>Dokumentierte Einnahmen</h2>
      <div id="events"></div>
    </section>

    <section>
      <h2>Neu berechneter Restplan</h2>
      <div id="plan"></div>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
