<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Medikamenten-Scheduler</title>
  <link rel="stylesheet" href="./styles/main.css" />
</head>
<body>
  <main>
    <h1>Medikamenten-Scheduler</h1>
    <p class="warning">Rechenhilfe. Keine medizinische Empfehlung. Regeln nicht erraten.</p>

    <section class="now-card">
      <div class="muted">Jetzt</div>
      <div id="nowLine" class="big">--:--</div>
      <div id="sinceLine" class="muted">Seit letzter dokumentierter Einnahme: —</div>
    </section>

    <section>
      <h2>Nächste Blöcke</h2>
      <div id="blocks"></div>
    </section>

    <section>
      <h2>Bedarf / optional</h2>
      <div class="manual-time">
        <label for="manualTime">Uhrzeit</label>
        <input id="manualTime" type="time" />
      </div>
      <div id="prnButtons" class="button-grid"></div>
    </section>

    <section>
      <h2>Dokumentierte Einnahmen</h2>
      <div id="events"></div>
      <button id="clearBtn" class="secondary danger">Tag löschen</button>
    </section>
  </main>

  <script type="module" src="./src/app.js"></script>
</body>
</html>
